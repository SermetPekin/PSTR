name: Test PSTR Package

on:
  push:
    branches: [ main, dev ]   
  pull_request:
    branches: [ main, dev ]  

jobs:
  test:
    runs-on: ubuntu-latest  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'   

          packages: devtools, testthat

      - name: Install dependencies
        run: |
          R -e 'install.packages("remotes")'
          R -e 'remotes::install_deps(dependencies = TRUE)'

      - name: Run tests
        run: R -e 'testthat::test_package()'

      - name: Report test results
        uses: r-lib/actions/report@v2
        with:
          test_results_file: testthat/testthat.Rout  
          reporter: junit   
          title: PSTR Package Tests
